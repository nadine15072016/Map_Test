<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ploting Area</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css" />
    <style>
        /* Marker foto geotagging simpel */
        .foto-marker-simpel {
            border: 2px solid #2a7a3a;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.10);
            width: 32px;
            height: 32px;
            object-fit: cover;
            background: #fff;
        }
        /* Animasi pulse untuk label khusus */
        .label-tri-anim {
            position: relative;
            animation: pulseLabel 1.2s infinite;
        }
        @keyframes pulseLabel {
            0% { box-shadow: 0 0 0 0 rgba(220,53,69,0.25); }
            70% { box-shadow: 0 0 0 8px rgba(220,53,69,0); }
            100% { box-shadow: 0 0 0 0 rgba(220,53,69,0.25); }
        }
    /* Tombol simpan dan ekspor compact */
    .form-actions button {
        padding: 2px 10px;
        font-size: 12px;
        height: 24px;
        border-radius: 4px;
        min-width: 56px;
        font-weight: 500;
    }
    /* Style tombol aksi tabel */
    #tabel-lahan .btn-aksi {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        padding: 0 2px;
        width: 22px;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        margin: 0;
        background: #f7f9fa;
        color: #222;
    }
    .container {
        max-width: 900px;
        margin: 32px auto;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        padding: 32px 24px;
    }
    h1, h2 {
        text-align: center;
        color: #2a7a3a;
    }
    #map {
        height: 420px;
        width: 100%;
        margin-bottom: 24px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    form {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        align-items: flex-end;
        margin-bottom: 24px;
    }
    form label {
        flex: 1 1 200px;
        display: flex;
        flex-direction: column;
        font-weight: 500;
    }
    form input, form select {
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #bbb;
        margin-top: 4px;
    }
    form input[type="file"] {
        padding: 0;
        max-width: 180px;
        min-width: 0;
        width: 100%;
        box-sizing: border-box;
    }
    button, .btn {
        background: #2a7a3a;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 10px 20px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
    }
    button:hover, .btn:hover {
        background: #22622e;
    }
    .actions {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        margin-bottom: 16px;
    }
    table {
        border-collapse: collapse;
        width: 100%;
        background: #fafbfc;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    th, td {
        border: 1px solid #e0e0e0;
        padding: 10px 8px;
        text-align: left;
    }
    th {
        background: #e8f5e9;
        color: #2a7a3a;
        text-align: center;
    }
    @media (max-width: 700px) {
        .container {
            padding: 4px 1vw;
            max-width: 100vw;
        }
        h1, h2 {
            font-size: 1.1rem;
            margin: 10px 0 8px 0;
        }
        #map {
            height: 180px;
            margin-bottom: 12px;
        }
        form {
            flex-direction: column;
            gap: 4px;
            margin-bottom: 10px;
        }
        form label {
            font-size: 13px;
            margin-bottom: 2px;
        }
        form input, form select {
            padding: 6px;
            font-size: 13px;
            border-radius: 4px;
        }
        form input[type="file"] {
            max-width: 100%;
            font-size: 12px;
        }
        .form-actions {
            flex-direction: column;
            gap: 4px;
            margin-bottom: 0;
        }
        .form-actions button {
            padding: 4px 8px;
            font-size: 12px;
            height: 22px;
            min-width: 44px;
        }
        #filter-lokasi {
            width: 100%;
            min-width: 0;
            font-size: 13px;
            padding: 6px;
        }
        .table-responsive {
            width: 100vw;
            margin-left: -2vw;
            padding: 0;
        }
        table, thead, tbody, th, td, tr {
            display: block;
            width: 100%;
        }
        th, td {
            box-sizing: border-box;
            width: 100%;
            padding: 6px 2px;
            font-size: 12px;
        }
        td img {
            width: 48px !important;
            height: 48px !important;
        }
        .btn-aksi {
            font-size: 16px;
            width: 28px;
            height: 28px;
        }
        #btn-kamera {
            padding: 4px 8px !important;
            font-size: 12px !important;
        }
        small, label small {
            font-size: 11px !important;
        }
    }
    @media (max-width: 400px) {
        .container { padding: 1px 0.5vw; }
        h1, h2 { font-size: 1rem; }
    }
    /* Scrollable table on mobile */
    .table-responsive { width: 100%; overflow-x: auto; }
    /* Tombol lokasi saya custom control Leaflet */
    .leaflet-control-lokasi {
        background: #fff;
        color: #2a7a3a;
        width: 34px;
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        outline: none;
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
        border-radius: 0;
        box-shadow: none;
        transition: background 0.2s;
    }
    .leaflet-control-lokasi:hover, .leaflet-control-lokasi:focus {
        background: #f4f4f4;
        color: #22622e;
    }
    @media (max-width: 700px) {
        .leaflet-control-lokasi {
            width: 30px;
            height: 30px;
            font-size: 16px;
        }
    }
    </style>
</head>
<body>
    <div class="container">
        <!-- lokasi-error dihapus, tidak ada popup error lokasi -->
        <h1>Pemetaan Lahan Pertanian</h1>
        <!-- Peta Interaktif -->
        <div style="position:relative;">
            <div id="map"></div>
            <!-- tombol lokasi lama dihapus, diganti dengan script otomatis -->
        </div>
        <!-- Form Input Data Survey Lokasi -->
        <form id="form-lahan">
            <label>Jenis Kegiatan
                <select id="jenis-kegiatan" required>
                    <option value="">-- Pilih Kegiatan --</option>
                    <option value="Irigasi">Irigasi</option>
                    <option value="Embung">Embung</option>
                    <option value="Perpipaan">Perpipaan</option>
                    <option value="Lainnya">Lainnya</option>
                </select>
            </label>
            <label>Nama Gapoktan/Kelompok
                <input type="text" id="gapoktan" placeholder="Contoh: Gapoktan Sumber Makmur">
            </label>
            <label>Nama Lokasi/Kegiatan
                <input type="text" id="nama" required placeholder="Contoh: Irigasi Desa X">
            </label>
            <label>Luas (ha) / Volume
                <input type="text" id="luas" required placeholder="Contoh: 1.25 atau 100m3">
            </label>
            <label>Deskripsi
                <input type="text" id="deskripsi" placeholder="Keterangan tambahan">
            </label>
            <label>Koordinat/Polygon
                <input type="text" id="koordinat" readonly required placeholder="Klik atau gambar di peta">
                <small style="color:#b00;font-size:12px;">Jika gagal mendapatkan lokasi: pastikan izin lokasi aktif & akses melalui HTTPS.</small>
            </label>
            <label>Foto Lokasi
                <input type="file" id="foto" accept="image/*" capture="environment">
                <button type="button" id="btn-kamera" style="margin-top:6px;margin-bottom:2px;padding:6px 12px;font-size:13px;background:#2a7a3a;color:#fff;border:none;border-radius:5px;cursor:pointer;">Ambil Foto Kamera</button>
                <input type="file" id="kamera-capture" accept="image/*" capture="environment" style="display:none">
                <small id="geotag-info" style="color:#2a7a3a;display:none;">Koordinat dari foto terdeteksi & otomatis diisi.</small>
            </label>
            <div class="form-actions">
                <button type="submit">Simpan</button>
                <button type="button" id="ekspor">Ekspor Data (CSV)</button>
            </div>
        </form>
        <!-- Tabel Data Lokasi -->
        <h2>Data Lokasi</h2>
        <div style="margin-bottom:16px;display:flex;justify-content:flex-end;">
            <input type="text" id="filter-lokasi" placeholder="Cari lokasi/kegiatan..." style="padding:8px;border-radius:6px;border:1px solid #bbb;width:220px;">
        </div>
        <div class="table-responsive">
        <table id="tabel-lokasi">
            <thead>
                <tr>
                    <th>No</th>
                    <th>Jenis Kegiatan</th>
                    <th>Nama Lokasi</th>
                    <th>Gapoktan/Kelompok</th>
                    <th>Luas/Volume</th>
                    <th>Deskripsi</th>
                    <th>X</th>
                    <th>Y</th>
                    <th>Foto</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        </div>
    </div>
        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
        <script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
        <script>
// === UTILITAS ===
function dmsToDecimal(dms, ref) {
    var deg = dms[0].numerator / dms[0].denominator;
    var min = dms[1].numerator / dms[1].denominator;
    var sec = dms[2].numerator / dms[2].denominator;
    var dec = deg + min/60 + sec/3600;
    if (ref === 'S' || ref === 'W') dec = -dec;
    return dec;
}
function getGpsFromFile(file, callback) {
    var reader = new FileReader();
    reader.onload = function(e) {
        var arrayBuffer = e.target.result;
        try {
            var tags = EXIF.readFromBinaryFile(arrayBuffer);
            var lat = null, lng = null;
            if(tags.GPSLatitude && tags.GPSLongitude && tags.GPSLatitudeRef && tags.GPSLongitudeRef) {
                lat = dmsToDecimal(tags.GPSLatitude, tags.GPSLatitudeRef);
                lng = dmsToDecimal(tags.GPSLongitude, tags.GPSLongitudeRef);
            }
            callback({lat: lat, lng: lng});
        } catch (err) {
            callback({lat: null, lng: null});
        }
    };
    reader.readAsArrayBuffer(file);
}

// === DATA & VARIABEL GLOBAL ===
var markerGeotag = null;
var map, userLocation = null;

// === INISIALISASI PETA ===
function initMap() {
    // Otomatis periksa lokasi tanpa popup
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(pos) {
            userLocation = [pos.coords.latitude, pos.coords.longitude];
            buatMap(userLocation);
        }, function(err) {
            // Jika gagal, langsung gunakan lokasi default tanpa popup
            buatMap([-1.6875, 101.6175]);
        }, {timeout: 10000});
    } else {
        buatMap([-1.6875, 101.6175]);
    }
}
function buatMap(center) {
    map = L.map('map', {maxZoom: 17}).setView(center, 15);
    var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap contributors', maxZoom: 22 });
    var sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles © Esri', maxZoom: 17 });
    var terrain = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { attribution: '© OpenTopoMap', maxZoom: 22 });
    var baseLayers = { "OSM": osm, "Satelit": sat, "Terrain": terrain };
    osm.addTo(map);
    L.control.layers(baseLayers).addTo(map);
    if(center && center.length===2) {
        // Tampilkan marker (pin) dan label
        L.marker(center).addTo(map);
        var label = L.divIcon({
            className: 'marker-label-kecil',
            html: '<span class="label-tri-anim" style="font-size:11px;color:#dc3545;background:#fffbe7;padding:2px 6px;border-radius:4px;box-shadow:0 1px 2px #0001;display:inline-block;line-height:1.3;max-width:120px;white-space:normal;text-align:center;">Tri Febrianti<br>Berada di Lokasi Ini</span>',
            iconSize: [220, 18],
            iconAnchor: [110, 32]
        });
        L.marker(center, {icon: label, interactive: false}).addTo(map);
    }
    afterMapInit();
}
function afterMapInit() {
    window.drawnItems = new L.FeatureGroup();
    map.addLayer(window.drawnItems);
    var drawControl = new L.Control.Draw({
        draw: { polygon: true, marker: true, polyline: false, rectangle: false, circle: false, circlemarker: false },
        edit: { featureGroup: window.drawnItems }
    });
    map.addControl(drawControl);
        map.on('click', function(e) {
            var latlng = e.latlng;
            document.getElementById('koordinat').value = latlng.lat.toFixed(6) + ',' + latlng.lng.toFixed(6);
            // Jangan hapus marker lain, hanya tambahkan marker baru
            var marker = L.marker(latlng);
            marker.on('dblclick', function() {
                window.drawnItems.removeLayer(marker);
            });
            marker.on('contextmenu', function(e) {
                window.drawnItems.removeLayer(marker);
            });
            window.drawnItems.addLayer(marker);
        });
    map.on(L.Draw.Event.CREATED, function (e) {
        // Tambahkan event dblclick jika marker
        if (e.layerType === 'marker') {
            var latlng = e.layer.getLatLng();
            document.getElementById('koordinat').value = latlng.lat.toFixed(6) + ',' + latlng.lng.toFixed(6);
            e.layer.on('dblclick', function() {
                window.drawnItems.removeLayer(e.layer);
            });
            e.layer.on('contextmenu', function(ev) {
                window.drawnItems.removeLayer(e.layer);
            });
        } else if (e.layerType === 'polygon') {
            var latlngs = e.layer.getLatLngs()[0].map(function(ll) {
                return ll.lat.toFixed(6) + ',' + ll.lng.toFixed(6);
            });
            document.getElementById('koordinat').value = latlngs.join(' | ');
        }
        window.drawnItems.addLayer(e.layer);
    });
            // clearLayers di event peta tidak diperlukan
    if (!map._lokasiControlAdded) {
        map.addControl(new LokasiControl());
        map._lokasiControlAdded = true;
    }
    // Pastikan marker data lokasi langsung muncul setelah peta siap
    renderTabelLokasi();
}

// === FORM HANDLER ===
document.addEventListener('DOMContentLoaded', function() {
    initMap();
    // renderTabelLokasi dipanggil di afterMapInit agar marker muncul setelah peta siap
    document.getElementById('form-lahan').onsubmit = handleFormSubmit;
    document.getElementById('foto').addEventListener('change', handleFotoChange);
    document.getElementById('btn-kamera').addEventListener('click', function() {
        document.getElementById('kamera-capture').click();
    });
    document.getElementById('kamera-capture').addEventListener('change', function(e) {
        var file = this.files && this.files[0];
        if(file) {
            // Pindahkan file hasil kamera ke input utama
            var dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);
            var fotoInput = document.getElementById('foto');
            fotoInput.files = dataTransfer.files;
            // Trigger event change agar proses sama seperti upload biasa
            var event = new Event('change', { bubbles: true });
            fotoInput.dispatchEvent(event);
        }
    });
    document.getElementById('filter-lokasi').oninput = filterTabelLokasi;
    document.getElementById('ekspor').onclick = eksporLokasiCSV;
});

function tampilkanFotoDiPeta(lat, lng, foto) {
    // Jangan hapus marker lain, hanya tambahkan marker baru
    renderSemuaMarkerPeta();
    // Temukan marker yang sesuai dan buka popup
    var found = false;
    window.drawnItems.eachLayer(function(layer) {
        if(layer.getLatLng && layer.getLatLng().lat.toFixed(6) == lat.toFixed(6) && layer.getLatLng().lng.toFixed(6) == lng.toFixed(6)) {
            if(foto) {
                layer.bindPopup('<div style="text-align:center"><img src="'+foto+'" style="width:60px;height:60px;border-radius:8px;object-fit:cover;"><br><span style="font-size:12px;color:#2a7a3a">'+lat.toFixed(6)+', '+lng.toFixed(6)+'</span></div>').openPopup();
            } else {
                layer.openPopup();
            }
            found = true;
        }
    });
    if(!found) {
        var marker = L.marker([lat, lng]).addTo(window.drawnItems);
        marker.bindPopup('<div style="text-align:center"><img src="'+foto+'" style="width:60px;height:60px;border-radius:8px;object-fit:cover;"><br><span style="font-size:12px;color:#2a7a3a">'+lat.toFixed(6)+', '+lng.toFixed(6)+'</span></div>').openPopup();
    }
    map.setView([lat, lng], 17);
}

function handleFormSubmit(e) {
    if(e) e.preventDefault();
    const jenisKegiatan = document.getElementById('jenis-kegiatan').value.trim();
    const nama = document.getElementById('nama').value.trim();
    const gapoktan = document.getElementById('gapoktan').value.trim();
    const luas = document.getElementById('luas').value.trim();
    const deskripsi = document.getElementById('deskripsi').value.trim();
    const koordinat = document.getElementById('koordinat').value.trim();
    const fotoInput = document.getElementById('foto');

    // Validasi wajib
    if (!jenisKegiatan || !nama || !luas || !koordinat) {
        alert('Semua field wajib diisi dan koordinat harus dipilih dari peta!');
        return;
    }

    function parseXY(koor) {
        // Jika polygon, ambil titik pertama
        let k = koor.includes('|') ? koor.split('|')[0].trim() : koor.trim();
        let coords = k.split(',');
        let lat = coords[0] && coords[0].trim() !== '' ? coords[0].trim() : '';
        let lng = coords[1] && coords[1].trim() !== '' ? coords[1].trim() : '';
        return {x: lat, y: lng};
    }

    function finishSubmit(foto, lat, lng) {
        let x = '', y = '';
        if (lat !== undefined && lat !== null && lat !== '') {
            x = lat;
        }
        if (lng !== undefined && lng !== null && lng !== '') {
            y = lng;
        }
        if (!x || !y) {
            let xy = parseXY(koordinat);
            x = x || xy.x;
            y = y || xy.y;
        }
        // Validasi x/y
        if (!x || !y || isNaN(parseFloat(x)) || isNaN(parseFloat(y))) {
            alert('Koordinat tidak valid!');
            return;
        }
        // Simpan data dengan pengecekan localStorage
        try {
            let dataSurveyNow = [];
            try {
                dataSurveyNow = JSON.parse(localStorage.getItem('dataSurvey')||'[]');
                if (!Array.isArray(dataSurveyNow)) dataSurveyNow = [];
            } catch (err) {
                dataSurveyNow = [];
            }
            // Pastikan x dan y bertipe string
            dataSurveyNow.push({jenisKegiatan, nama, gapoktan, luas, deskripsi, koordinat: String(x)+','+String(y), x: String(x), y: String(y), foto:foto||''});
            localStorage.setItem('dataSurvey', JSON.stringify(dataSurveyNow));
            setTimeout(renderTabelLokasi, 0);
            // Reset form, JANGAN kosongkan koordinat agar user bisa input beruntun tanpa klik peta lagi
            var lastKoordinat = document.getElementById('koordinat').value;
            document.getElementById('form-lahan').reset();
            document.getElementById('koordinat').value = lastKoordinat;
            // Tampilkan notifikasi sukses
            alert('Data berhasil disimpan!');
        } catch (err) {
            console.error('Gagal menyimpan data:', err);
            alert('Gagal menyimpan data! Pastikan browser mengizinkan penyimpanan lokal (localStorage) dan tidak dalam mode private/incognito.\nError: ' + err);
        }
    }

    if(fotoInput.files && fotoInput.files[0]) {
        processFotoGeotag(fotoInput.files[0], function(res) {
            finishSubmit(res.foto, res.lat, res.lng);
        });
    } else {
        finishSubmit('', '', '');
    }
    return false;
}

function handleFotoChange(e) {
    var file = this.files && this.files[0];
    if(!file) return;
    processFotoGeotag(file, function(res) {
        if(res.lat && res.lng) {
            // Jika foto punya lokasi, tampilkan marker foto dan isi input koordinat
            document.getElementById('koordinat').value = res.lat + ',' + res.lng;
            if(res.foto) {
                tampilkanFotoDiPeta(parseFloat(res.lat), parseFloat(res.lng), res.foto);
            } else {
                renderSemuaMarkerPeta();
                map.setView([parseFloat(res.lat),parseFloat(res.lng)], 17);
            }
            document.getElementById('geotag-info').style.display = '';
        } else {
            // Jika tidak ada lokasi di foto, kosongkan input koordinat
            document.getElementById('koordinat').value = '';
            document.getElementById('geotag-info').style.display = 'none';
        }
    });
}

function processFotoGeotag(file, callback) {
    var reader = new FileReader();
    reader.onload = function(e) {
        var base64 = e.target.result;
        getGpsFromFile(file, function(gps) {
            callback({foto: base64, lat: gps.lat, lng: gps.lng});
        });
    };
    reader.readAsDataURL(file);
}

// === TABEL & DATA ===
function renderTabelLokasi() {
    var tbody = document.querySelector('#tabel-lokasi tbody');
    tbody.innerHTML = '';
    var dataSurvey = JSON.parse(localStorage.getItem('dataSurvey')||'[]');
    console.log('Render tabel lokasi, jumlah data:', dataSurvey.length, dataSurvey);
    dataSurvey.forEach(function(item, idx) {
        var tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${idx+1}</td>
            <td>${item.jenisKegiatan}</td>
            <td>${item.nama}</td>
            <td>${item.gapoktan||''}</td>
            <td>${item.luas}</td>
            <td>${item.deskripsi||''}</td>
            <td>${item.x||''}</td>
            <td>${item.y||''}</td>
            <td>${item.foto?'<img src="'+item.foto+'" width="60" style="cursor:pointer" class="foto-tabel" data-idx="'+idx+'">':''}</td>
            <td><button onclick="hapusSurvey(${idx})" title="Hapus" class="btn-aksi">🗑️</button></td>
        `;
        tbody.appendChild(tr);
    });
    // Tambahkan event klik pada foto di tabel
    tbody.querySelectorAll('.foto-tabel').forEach(function(img) {
        img.addEventListener('click', function() {
            var idx = this.getAttribute('data-idx');
            var dataSurveyNow = JSON.parse(localStorage.getItem('dataSurvey')||'[]');
            var item = dataSurveyNow[idx];
            if(item && item.foto && item.x && item.y) {
                tampilkanFotoDiPeta(parseFloat(item.x), parseFloat(item.y), item.foto);
            }
        });
    });
    renderSemuaMarkerPeta();
}

// Fungsi untuk menampilkan semua marker lokasi pada peta
function renderSemuaMarkerPeta() {
    if(!window.drawnItems) {
        console.warn('drawnItems belum diinisialisasi, skip render marker');
        return;
    }
    window.drawnItems.clearLayers();
    var allData = JSON.parse(localStorage.getItem('dataSurvey')||'[]');
    allData.forEach(function(item) {
        if(item.x && item.y) {
            var lat = parseFloat(item.x);
            var lng = parseFloat(item.y);
            if(!isNaN(lat) && !isNaN(lng)) {
                var marker = L.marker([lat, lng]).addTo(window.drawnItems)
                    .bindPopup('<div style="font-size:13px;"><b>'+ (item.nama||'Lokasi') +'</b><br>'+lat.toFixed(6)+', '+lng.toFixed(6)+(item.foto?'<br><img src="'+item.foto+'" style="width:50px;height:50px;border-radius:6px;object-fit:cover;">':'')+'</div>');
                // Tambahkan label kecil di bawah marker
                var label = L.divIcon({
                    className: 'marker-label-kecil',
                    html: '<span style="font-size:11px;color:#2a7a3a;background:#fffbe7;padding:2px 6px;border-radius:4px;box-shadow:0 1px 2px #0001;display:inline-block;line-height:1.3;max-width:120px;white-space:normal;text-align:center;">'+((item.nama||'Lokasi').replace(/ /g,'<br>'))+'</span>',
                    iconSize: [100, 28],
                    iconAnchor: [50, 32] // label di atas marker (32px tinggi marker)
                });
                L.marker([lat, lng], {icon: label, interactive: false}).addTo(window.drawnItems);
            }
        }
    });
}
function hapusSurvey(idx) {
    if(confirm('Hapus data ini?')) {
        var dataSurveyNow = JSON.parse(localStorage.getItem('dataSurvey')||'[]');
        dataSurveyNow.splice(idx,1);
        localStorage.setItem('dataSurvey', JSON.stringify(dataSurveyNow));
        renderTabelLokasi();
    }
}
function filterTabelLokasi() {
    var val = this.value.toLowerCase();
    var tbody = document.querySelector('#tabel-lokasi tbody');
    Array.from(tbody.children).forEach(function(tr) {
        tr.style.display = tr.textContent.toLowerCase().includes(val)?'':'none';
    });
}
function eksporLokasiCSV() {
    var dataSurveyNow = JSON.parse(localStorage.getItem('dataSurvey')||'[]');
    var csv = 'Jenis Kegiatan,Nama,Gapoktan/Kelompok,Luas,Deskripsi,X,Y\n';
    dataSurveyNow.forEach(function(item) {
        csv += `"${item.jenisKegiatan}","${item.nama}","${item.gapoktan||''}","${item.luas}","${item.deskripsi||''}","${item.x||''}","${item.y||''}"\n`;
    });
    var blob = new Blob([csv], {type: 'text/csv'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'data_lokasi.csv';
    a.click();
    URL.revokeObjectURL(url);
}

// === CUSTOM CONTROL LOKASI SAYA ===
var userMarker;
var userMarker, userLabelMarker;
var LokasiControl = L.Control.extend({
    options: { position: 'topright' },
    onAdd: function(map) {
        var container = L.DomUtil.create('div', 'leaflet-bar');
        var btn = L.DomUtil.create('a', 'leaflet-control-lokasi', container);
        btn.id = 'btn-lokasi-sekarang';
        btn.href = '#';
        btn.title = 'Kembali ke Lokasi Saya';
        btn.setAttribute('role', 'button');
        btn.setAttribute('tabindex', '0');
        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><line x1="12" y1="3" x2="12" y2="1" stroke="currentColor" stroke-width="2"/><line x1="12" y1="23" x2="12" y2="21" stroke="currentColor" stroke-width="2"/><line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2"/><line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="2"/></svg>';
        L.DomEvent.on(btn, 'click', function(e) {
            L.DomEvent.stopPropagation(e);
            L.DomEvent.preventDefault(e);
            if (navigator.geolocation) {
                btn.classList.add('leaflet-control-lokasi-loading');
                navigator.geolocation.getCurrentPosition(function(pos) {
                    var lat = pos.coords.latitude;
                    var lng = pos.coords.longitude;
                    var userLatLng = [lat, lng];
                    map.setView(userLatLng, 16, { animate: true });
                    // Tampilkan marker (pin) dan label
                    if (userMarker) {
                        userMarker.setLatLng(userLatLng).update();
                    } else {
                        userMarker = L.marker(userLatLng).addTo(map);
                    }
                    if (userLabelMarker) {
                        userLabelMarker.setLatLng(userLatLng).update();
                    } else {
                        var label = L.divIcon({
                            className: 'marker-label-kecil',
                            html: '<span class="label-tri-anim" style="font-size:11px;color:#dc3545;background:#fffbe7;padding:2px 6px;border-radius:4px;box-shadow:0 1px 2px #0001;display:inline-block;line-height:1.3;max-width:120px;white-space:normal;text-align:center;">Tri Febrianti<br>Berada di Lokasi Ini</span>',
                            iconSize: [220, 18],
                            iconAnchor: [110, 32]
                        });
                        userLabelMarker = L.marker(userLatLng, {icon: label, interactive: false}).addTo(map);
                    }
                    btn.classList.remove('leaflet-control-lokasi-loading');
                }, function() {
                    alert('Gagal mendapatkan lokasi.');
                    btn.classList.remove('leaflet-control-lokasi-loading');
                });
            }
        });
        return container;
    }
});
        </script>
